# =============================================================================
# File: themes/theme.conf
# Description: Unified desktop theming tokens and styling configuration.
# Layer: Layer 10 — Final Polish
# =============================================================================

[appearance]
color_scheme = dark
gtk_theme = Adwaita:dark
icon_theme = Papirus-Dark
cursor_theme = Bibata-Modern-Ice
cursor_size = 24

[typography]
font_family = JetBrains Mono Nerd Font
font_size = 10
font_antialiasing = true
font_hinting = slight

[geometry]
border_radius_small = 8
border_radius_large = 12
border_width = 2
border_active_gradient = rgba(38BDF8FF) rgba(8B5CF6FF) 45deg
border_inactive_color = rgba(1E293B88)

[effects]
blur_enabled = true
blur_passes = 3
blur_size = 8
blur_noise = 0.0117
blur_contrast = 0.8916
blur_brightness = 0.8172

[opacity]
opacity_active = 1.00
opacity_inactive = 0.95
opacity_fullscreen = 1.00

[animations]
animations_enabled = true
bezier_snappy = 0.05, 0.9, 0.1, 1.05
bezier_smooth = 0.25, 1, 0.5, 1
duration_windows = 4
duration_workspaces = 5
