# =============================================================================
# File: starship/starship.toml
# Description: Clean Cyber-Minimal prompt configuration for Starship.
# Layer: Layer 4 — Developer Environment
# =============================================================================

format = """
[┌── ](fg:#475569)$username$hostname$directory$git_branch$git_status$nodejs$rust$golang$python$docker
[└─❯](fg:#38BDF8) """

right_format = """$cmd_duration$time"""

add_newline = true
command_timeout = 1000

[username]
style_user = "bold fg:#38BDF8"
style_root = "bold fg:#F43F5E"
format = "[$user]($style)"
show_always = false

[hostname]
ssh_only = true
style = "bold fg:#8B5CF6"
format = "[@$hostname]($style) "

[directory]
style = "bold fg:#E5E7EB"
read_only = " 󰌾"
read_only_style = "fg:#F43F5E"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold fg:#8B5CF6"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold fg:#F59E0B"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[nodejs]
symbol = " "
style = "bold fg:#10B981"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "bold fg:#F59E0B"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold fg:#38BDF8"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "bold fg:#F59E0B"
format = '[$symbol($version )(\($virtualenv\) )]($style)'

[docker]
symbol = " "
style = "bold fg:#38BDF8"
format = "[$symbol$context]($style) "

[cmd_duration]
min_time = 2000
style = "bold fg:#F59E0B"
format = "⏱ [$duration]($style) "

[time]
disabled = false
style = "fg:#94A3B8"
format = "[$time]($style)"
time_format = "%H:%M:%S"

[character]
success_symbol = "[❯](bold fg:#38BDF8)"
error_symbol = "[❯](bold fg:#F43F5E)"
vicmd_symbol = "[❮](bold fg:#8B5CF6)"
