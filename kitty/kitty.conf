# =============================================================================
# File: kitty/kitty.conf
# Description: Main configuration for Kitty terminal emulator.
# Layer: Layer 4 — Developer Environment
# =============================================================================

# Include color palette and theme
include themes/cyber-minimal.conf

# -----------------------------------------------------------------------------
# Font Configuration
# -----------------------------------------------------------------------------
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Adjust line height for better code readability
modify_font cell_height 120%

# Disable ligatures under cursor for easy character editing
disable_ligatures cursor

# -----------------------------------------------------------------------------
# Cursor Styling
# -----------------------------------------------------------------------------
cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 10.0

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
scrollback_lines 20000
scrollback_pager bat --paging=always
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 1.5

# -----------------------------------------------------------------------------
# Mouse and Clipboard
# -----------------------------------------------------------------------------
mouse_hide_wait 3.0
url_color #38BDF8
url_style curly
open_url_with default
detect_urls yes

# Auto copy selection to clipboard (Wayland integrated)
copy_on_select clipboard
strip_trailing_spaces smart

# -----------------------------------------------------------------------------
# Terminal Bell
# -----------------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# -----------------------------------------------------------------------------
# Window Layout & Appearance
# -----------------------------------------------------------------------------
remember_window_size  no
initial_window_width  1100
initial_window_height 700
window_padding_width  14
window_margin_width   0
single_window_margin_width -1

# Window borders and rounded corners (handled via compositor / decoration)
draw_minimal_borders yes
window_border_width 1.5pt
active_border_color #38BDF8
inactive_border_color #1E293B

# Background Opacity and Blur
background_opacity 0.85
dynamic_background_opacity yes

# -----------------------------------------------------------------------------
# Tab Bar Styling
# -----------------------------------------------------------------------------
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_margin_width 0.0
active_tab_font_style   bold
inactive_tab_font_style normal

# -----------------------------------------------------------------------------
# Advanced & Quality-of-Life
# -----------------------------------------------------------------------------
allow_remote_control yes
listen_on unix:/tmp/kitty
shell_integration enabled
term xterm-kitty

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
