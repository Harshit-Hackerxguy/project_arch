font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

modify_font cell_height 130%
modify_font baseline 0
disable_ligatures cursor

cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 10.0

scrollback_lines 25000
scrollback_pager bat --paging=always
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 1.5
repaint_delay 8
input_delay 2
sync_to_monitor yes

mouse_hide_wait 3.0
url_color #38BDF8
url_style curly
open_url_with default
detect_urls yes

copy_on_select clipboard
strip_trailing_spaces smart

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

remember_window_size  no
initial_window_width  1200
initial_window_height 750
window_padding_width  18 22 18 22
window_margin_width   0
single_window_margin_width -1

draw_minimal_borders yes
window_border_width 0pt
hide_window_decorations yes

background_opacity 0.78
dynamic_background_opacity yes

tab_bar_style fade
tab_fade 0.25 0.5 0.75 1
tab_bar_edge bottom
tab_bar_margin_width 8.0
tab_bar_margin_height 6.0 0.0
active_tab_font_style   bold
inactive_tab_font_style normal

active_tab_foreground   #0B0F14
active_tab_background   #38BDF8
inactive_tab_foreground #94A3B8
inactive_tab_background #1E293B

foreground #E2E8F0
background #0B0F14
selection_foreground #0B0F14
selection_background #38BDF8

cursor #38BDF8
cursor_text_color #0B0F14

color0 #1E293B
color8 #475569

color1 #F43F5E
color9 #FB7185

color2 #10B981
color10 #34D399

color3 #F59E0B
color11 #FBBF24

color4 #38BDF8
color12 #7DD3FC

color5 #A855F7
color13 #C084FC

color6 #06B6D4
color14 #22D3EE

color7 #E2E8F0
color15 #F8FAFC

mark1_foreground #0B0F14
mark1_background #38BDF8
mark2_foreground #0B0F14
mark2_background #A855F7
mark3_foreground #0B0F14
mark3_background #10B981

allow_remote_control yes
listen_on unix:/tmp/kitty
shell_integration enabled
term xterm-kitty

confirm_os_window_close -1

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+l next_layout
