# =============================================================================
# File: gtk/qt5ct.conf
# Description: Qt5/Qt6 configuration for Cyber-Minimal Scandinavian styling.
# Layer: Layer 10 — Final Polish
# =============================================================================

[Appearance]
style = kvantum-dark
icon_theme = Papirus-Dark
color_scheme_path = ~/.config/qt5ct/colors/cyber-minimal.conf
custom_palette = true
standard_dialogs = xdgdesktopportal
wheel_scroll_lines = 3

[Fonts]
general = "JetBrainsMono Nerd Font,10,-1,5,50,0,0,0,0,0"
fixed = "JetBrainsMono Nerd Font,10,-1,5,50,0,0,0,0,0"

[Interface]
activate_item_on_single_click = 1
buttonbox_layout = 0
cursor_flash_time = 1000
dialog_buttons_have_icons = 0
double_click_interval = 400
gui_effects = @Invalid()
keyboard_scheme = 2
menus_have_icons = true
show_shortcuts_in_context_menus = true
toolbutton_style = 4
underline_shortcut = 1
wheel_scroll_lines = 3
