# =============================================================================
# File: gtk/xsettingsd.conf
# Description: XSettings daemon configuration for XWayland apps.
# Layer: Layer 10 — Final Polish
# =============================================================================

Net/ThemeName "Adwaita-dark"
Net/IconThemeName "Papirus-Dark"
Gtk/CursorThemeName "Bibata-Modern-Ice"
Gtk/CursorThemeSize 24
Gtk/FontName "JetBrainsMono Nerd Font 10"
Gtk/DecorationLayout "menu:close"
Gtk/ButtonImages 0
Gtk/MenuImages 0
Gtk/EnableEventSounds 0
Gtk/EnableInputFeedbackSounds 0
Xft/Antialias 1
Xft/Hinting 1
Xft/HintStyle "hintslight"
Xft/RGBA "rgb"
