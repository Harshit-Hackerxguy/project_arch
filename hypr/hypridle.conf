# =============================================================================
# File: hypr/hypridle.conf
# Description: Hypridle configuration for automatic screen timeout and locking.
# Layer: Layer 8 — Session, Lock Screen & Power Management
# =============================================================================

general {
    lock_cmd = pidof hyprlock || hyprlock
    unlock_cmd = pkill -USR1 hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = ~/.config/scripts/power/resume.sh
    ignore_dbus_inhibit = false
}

# -----------------------------------------------------------------------------
# Stage 1: Dim display (after 5 minutes of inactivity)
# -----------------------------------------------------------------------------
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# -----------------------------------------------------------------------------
# Stage 2: Lock session (after 10 minutes of inactivity)
# -----------------------------------------------------------------------------
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# -----------------------------------------------------------------------------
# Stage 3: Turn off displays via DPMS (after 15 minutes of inactivity)
# -----------------------------------------------------------------------------
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# -----------------------------------------------------------------------------
# Stage 4: Suspend system (after 30 minutes of inactivity)
# -----------------------------------------------------------------------------
listener {
    timeout = 1800
    on-timeout = ~/.config/scripts/power/suspend.sh
}
