# =============================================================================
# File: ~/.config/hypr/monitors.conf
# Description: Monitor layout, resolution, refresh rate, and DPI scaling.
# =============================================================================

# -----------------------------------------------------------------------------
# Default Auto-Detection
# format: monitor = name, resolution, position, scale
# -----------------------------------------------------------------------------
monitor = , preferred, auto, 1

# -----------------------------------------------------------------------------
# Multi-Monitor Configuration Examples
# Uncomment and customize based on specific hardware layout:
# -----------------------------------------------------------------------------
# High refresh rate primary monitor at 1440p:
# monitor = DP-1, 2560x1440@165, 0x0, 1

# Secondary vertical 1080p monitor positioned to the right:
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1, transform, 1

# Mirroring display output (e.g. presentation or projector):
# monitor = HDMI-A-2, preferred, auto, 1, mirror, DP-1
