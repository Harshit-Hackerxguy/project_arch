# =============================================================================
# File: ~/.config/hypr/binds.conf
# Description: Professional production-ready keybinding layout.
# =============================================================================

# -----------------------------------------------------------------------------
# Core Applications & System Controls
# -----------------------------------------------------------------------------
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManagerAlt
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,

# -----------------------------------------------------------------------------
# Session & System Management
# -----------------------------------------------------------------------------
bind = $mainMod SHIFT, R, exec, hyprctl reload && notify-send "Hyprland" "Configuration successfully reloaded"
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, L, exec, loginctl lock-session || hyprlock

# -----------------------------------------------------------------------------
# Window Navigation (Vim-style & Arrow Keys)
# -----------------------------------------------------------------------------
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# -----------------------------------------------------------------------------
# Window Movement (Vim-style & Arrow Keys)
# -----------------------------------------------------------------------------
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# -----------------------------------------------------------------------------
# Workspaces (Switching 1-9)
# -----------------------------------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# -----------------------------------------------------------------------------
# Workspaces (Moving Windows to Workspaces 1-9)
# -----------------------------------------------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# -----------------------------------------------------------------------------
# Mouse Control (Move / Resize & Scroll Workspace Switching)
# -----------------------------------------------------------------------------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# -----------------------------------------------------------------------------
# Multimedia & Brightness Controls
# -----------------------------------------------------------------------------
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@)"
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@)"
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl set +5% && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low "Brightness" "$(brightnessctl -m | cut -d, -f4)"
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low "Brightness" "$(brightnessctl -m | cut -d, -f4)"

# -----------------------------------------------------------------------------
# Screenshot Utilities
# -----------------------------------------------------------------------------
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Region copied to clipboard"
bind = SHIFT, Print, exec, grim - | wl-copy && notify-send "Screenshot" "Full screen copied to clipboard"
