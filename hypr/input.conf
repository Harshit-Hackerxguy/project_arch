# =============================================================================
# File: ~/.config/hypr/input.conf
# Description: Keyboard, mouse, touchpad configuration.
# =============================================================================

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0.0
    accel_profile = flat

    repeat_rate = 50
    repeat_delay = 300

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        disable_while_typing = true
    }
}