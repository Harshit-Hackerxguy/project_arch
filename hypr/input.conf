# =============================================================================
# File: ~/.config/hypr/input.conf
# Description: Keyboard, mouse, touchpad, and gesture configuration.
# =============================================================================

# -----------------------------------------------------------------------------
# Core Input Configuration
# -----------------------------------------------------------------------------
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0.0
    accel_profile = flat

    repeat_rate = 50
    repeat_delay = 300

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        disable_while_typing = true
    }
}

# -----------------------------------------------------------------------------
# Multitouch Gestures
# -----------------------------------------------------------------------------
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
}
