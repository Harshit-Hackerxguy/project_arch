# =============================================================================
# File: ~/.config/hypr/appearance.conf
# Description: Gaps, borders, rounded corners, blur, and shadows.
# =============================================================================

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(38bdf8ee) rgba(8b5cf6ee) 45deg
    col.inactive_border = rgba(1e293baa)
    layout = dwindle
   # resize_on_border = true
   # hover_icon_on_border = true
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 3
       # new_optimizations = true
        xray = false
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(00000055)
    }
}
