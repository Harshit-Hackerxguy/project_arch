general {
    gaps_in = 8
    gaps_out = 16
    border_size = 2
    col.active_border = rgba(38bdf8ee) rgba(a855f7ee) rgba(ec4899ee) 45deg
    col.inactive_border = rgba(1e293b55)
    layout = dwindle
    resize_on_border = true
    hover_icon_on_border = true
}

decoration {
    rounding = 18
    active_opacity = 0.95
    inactive_opacity = 0.88
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 12
        passes = 4
        xray = false
        ignore_opacity = true
        new_optimizations = true
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = 0.1696
        vibrancy_darkness = 0.0
        popups = true
    }

    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(0b0f1488)
        offset = 0, 4
        scale = 1.0
    }
}
