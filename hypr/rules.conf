}

windowrule {
    name = windowrule-15
    opacity = 0.92 override 0.88 override
    match:class = ^(codium)$
}

windowrule {
    name = windowrule-16
    opacity = 0.95 override 0.90 override
    match:class = ^(thunar)$
}

windowrule {
    name = windowrule-17
    opacity = 0.95 override 0.90 override
    match:class = ^(dolphin)$
}

windowrule {
    name = windowrule-18
    opacity = 0.88 override 0.80 override
    match:class = ^(discord)$
}

windowrule {
    name = windowrule-19
    opacity = 0.88 override 0.80 override
    match:class = ^(WebCord)$
}

windowrule {
    name = windowrule-20
    opacity = 0.88 override 0.80 override
    match:class = ^(Spotify)$
}

windowrule {
    name = windowrule-21
    opacity = 1.0 override 1.0 override
    match:class = ^(firefox)$
}

windowrule {
    name = windowrule-22
    opacity = 1.0 override 1.0 override
    match:class = ^(chromium)$
}

windowrule {
    name = windowrule-23
    float = on
    pin = on
    size = 480 270
    move = ((monitor_w*1)-490) ((monitor_h*1)-280)
    match:title = ^(Picture-in-Picture)$
}

windowrule {
    name = windowrule-24
    opacity = 1.0 override 1.0 override
    match:title = ^(Picture-in-Picture)$
}

windowrule {
    name = windowrule-25
    float = on
    size = 1000 650
    center = on
    workspace = special:scratchpad silent
    match:class = ^(scratchpad)$
}

windowrule {
    name = windowrule-26
    opacity = 0.88 override 0.80 override
    float = on
    match:class = ^(com.github.Aylur.ags)$
}

windowrule {
    name = windowrule-27
    opacity = 0.90 override 0.85 override
    match:class = ^(org.gnome.Nautilus)$
}

windowrule {
    name = windowrule-28
    float = on
    center = on
    size = 680 480
    match:class = ^(blueman-manager)$
}

windowrule {
    name = windowrule-29
    float = on
    center = on
    size = 750 520
    match:class = ^(nm-connection-editor)$
}

windowrule {
    name = windowrule-30
    opacity = 0.90 override 0.85 override
    match:class = ^(Obsidian)$
}

layerrule {
    name = layerrule-1
    blur = on
    ignore_alpha = 0.3
    match:namespace = waybar
}

layerrule {
    name = layerrule-2
    blur = on
    ignore_alpha = 0.3
    match:namespace = rofi
}

layerrule {
    name = layerrule-3
    blur = on
    ignore_alpha = 0.3
    match:namespace = dunst
}

layerrule {
    name = layerrule-4
    blur = on
    ignore_alpha = 0.2
    match:namespace = notifications
}

layerrule {
    name = layerrule-5
    blur = on
    ignore_alpha = 0.2
    match:namespace = gtk-layer-shell
}

layerrule {
    name = layerrule-6
    blur = on
    ignore_alpha = 0.2
