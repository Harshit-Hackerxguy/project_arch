}

windowrule {
    name = windowrule-10
    float = on
    match:class = ^(polkit-kde-authentication-agent-1)$
}

windowrule {
    name = windowrule-11
    opacity = 0.92 override 0.85 override
    match:class = ^(kitty)$
}

windowrule {
    name = windowrule-12
    opacity = 0.90 override 0.82 override
    match:class = ^(Alacritty)$
}

windowrule {
    name = windowrule-13
    opacity = 0.92 override 0.88 override
    match:class = ^(Code)$
}

windowrule {
    name = windowrule-14
