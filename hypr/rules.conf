# =============================================================================
# File: ~/.config/hypr/rules.conf
# Description: Comprehensive window rules, layer rules, and scratchpad rules.
# =============================================================================

# -----------------------------------------------------------------------------
# Floating Dialog Windows
# -----------------------------------------------------------------------------
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(qt5ct)$
windowrulev2 = float, class:^(qt6ct)$
windowrulev2 = float, class:^(org.gnome.FileRoller)$
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float, class:^(thunar)$, title:^(Confirm to replace files)$
windowrulev2 = float, title:^(Authentication Required)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float, class:^(polkit-kde-authentication-agent-1)$

# Center floating dialogs
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(nwg-look)$
windowrulev2 = center, class:^(org.gnome.FileRoller)$

# Size adjustments for common dialogs
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = size 900 650, class:^(nwg-look)$

# -----------------------------------------------------------------------------
# Multimedia & Picture-in-Picture
# -----------------------------------------------------------------------------
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 480 270, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-490 100%-280, title:^(Picture-in-Picture)$

# -----------------------------------------------------------------------------
# Scratchpad Rules
# -----------------------------------------------------------------------------
windowrulev2 = float, class:^(scratchpad)$
windowrulev2 = size 1000 650, class:^(scratchpad)$
windowrulev2 = center, class:^(scratchpad)$
windowrulev2 = workspace special:scratchpad silent, class:^(scratchpad)$

# -----------------------------------------------------------------------------
# Layer Rules (Waybar, Rofi, Dunst notifications)
# -----------------------------------------------------------------------------
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, dunst
layerrule = ignorezero, dunst
