# =============================================================================

# File: ~/.config/hypr/rules.conf

# Description: Comprehensive window rules, layer rules, and scratchpad rules.

# =============================================================================



# -----------------------------------------------------------------------------

# Floating Dialog Windows

# -----------------------------------------------------------------------------

windowrule {
  name = windowrule-1
  float = on
  center = on
  size = 800 600
  match:class = ^(pavucontrol)$
}


windowrule {
  name = windowrule-2
  float = on
  center = on
  size = 900 650
  match:class = ^(nwg-look)$
}


windowrule {
  name = windowrule-3
  float = on
  match:class = ^(qt5ct)$
}


windowrule {
  name = windowrule-4
  float = on
  match:class = ^(qt6ct)$
}


windowrule {
  name = windowrule-5
  float = on
  center = on
  match:class = ^(org.gnome.FileRoller)$
}


windowrule {
  name = windowrule-6
  float = on
  match:class = ^(thunar)$
  match:title = ^(File Operation Progress)$
}


windowrule {
  name = windowrule-7
  float = on
  match:class = ^(thunar)$
  match:title = ^(Confirm to replace files)$
}


windowrule {
  name = windowrule-8
  float = on
  match:title = ^(Authentication Required)$
}


windowrule {
  name = windowrule-9
  float = on
  match:class = ^(polkit-gnome-authentication-agent-1)$
}


windowrule {
  name = windowrule-10
  float = on
  match:class = ^(polkit-kde-authentication-agent-1)$
}




# Center floating dialogs






# Size adjustments for common dialogs





# -----------------------------------------------------------------------------

# Multimedia & Picture-in-Picture

# -----------------------------------------------------------------------------

windowrule {
  name = windowrule-11
  float = on
  pin = on
  size = 480 270
  move = ((monitor_w*1)-490) ((monitor_h*1)-280)
  match:title = ^(Picture-in-Picture)$
}







# -----------------------------------------------------------------------------

# Scratchpad Rules

# -----------------------------------------------------------------------------

windowrule {
  name = windowrule-12
  float = on
  size = 1000 650
  center = on
  workspace = special:scratchpad silent
  match:class = ^(scratchpad)$
}







# -----------------------------------------------------------------------------

# Layer Rules (Waybar, Rofi, Dunst notifications)

# -----------------------------------------------------------------------------

layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = waybar
}



layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0
  match:namespace = rofi
}



layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0
  match:namespace = dunst
}

