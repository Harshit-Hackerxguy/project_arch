windowrule {
    name = windowrule-1
    float = on
    center = on
    size = 800 600
    match:class = ^(pavucontrol)$
}

windowrule {
    name = windowrule-2
    float = on
    center = on
    size = 900 650
    match:class = ^(nwg-look)$
}

windowrule {
    name = windowrule-3
    float = on
    match:class = ^(qt5ct)$
}

windowrule {
    name = windowrule-4
    float = on
    match:class = ^(qt6ct)$
}

windowrule {
    name = windowrule-5
    float = on
    center = on
    match:class = ^(org.gnome.FileRoller)$
}

windowrule {
    name = windowrule-6
    float = on
    match:class = ^(thunar)$
    match:title = ^(File Operation Progress)$
}

windowrule {
    name = windowrule-7
    float = on
    match:class = ^(thunar)$
    match:title = ^(Confirm to replace files)$
}

windowrule {
    name = windowrule-8
