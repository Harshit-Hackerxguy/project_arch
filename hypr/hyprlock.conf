# =============================================================================
# File: hypr/hyprlock.conf
# Description: Cyber-Minimal Scandinavian lock screen configuration.
# Layer: Layer 8 — Session, Lock Screen & Power Management
# =============================================================================

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = ~/.config/wallpapers/current.png
    color = rgba(11, 15, 20, 0.95)

    # Blur styling
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# -----------------------------------------------------------------------------
# Clock Display
# -----------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(229, 231, 235, 0.95)
    font_size = 96
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# -----------------------------------------------------------------------------
# Date Display
# -----------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +"%A, %B %d")"
    color = rgba(148, 163, 184, 0.85)
    font_size = 22
    font_family = Inter Medium
    position = 0, 80
    halign = center
    valign = center
}

# -----------------------------------------------------------------------------
# User Greeting
# -----------------------------------------------------------------------------
label {
    monitor =
    text =   $USER
    color = rgba(56, 189, 248, 0.90)
    font_size = 18
    font_family = JetBrains Mono Nerd Font Medium
    position = 0, -40
    halign = center
    valign = center
}

# -----------------------------------------------------------------------------
# Password Input Field
# -----------------------------------------------------------------------------
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(56, 189, 248, 0.60)
    inner_color = rgba(17, 24, 39, 0.85)
    font_color = rgba(229, 231, 235, 0.90)
    fade_on_empty = false
    fade_timeout = 2000
    placeholder_text = <i><span foreground="##94A3B8">Password...</span></i>
    hide_input = false
    rounding = 8
    check_color = rgba(139, 92, 246, 0.80)
    fail_color = rgba(244, 63, 94, 0.80)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, -120
    halign = center
    valign = center
}
