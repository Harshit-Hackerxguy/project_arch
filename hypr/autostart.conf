# =============================================================================
# File: ~/.config/hypr/autostart.conf
# Description: Autostart background daemons, UI components, and portals.
# =============================================================================

# -----------------------------------------------------------------------------
# System & Portal Integration
# -----------------------------------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1 || /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# -----------------------------------------------------------------------------
# Core Desktop Components & Daemons
# -----------------------------------------------------------------------------
exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = hypridle

# Clipboard management
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# -----------------------------------------------------------------------------
# Optional Custom Autostart Script
# -----------------------------------------------------------------------------
exec-once = ~/.config/scripts/autostart.sh
