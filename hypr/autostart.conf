# =============================================================================
# File: hypr/autostart.conf
# Description: Hyprland autostart configuration for background services.
# Layer: Integration (Layers 4–7)
# =============================================================================

# Execute autostart script to launch background daemons idempotently
exec-once = ~/.config/scripts/autostart.sh

# Ensure XDG Desktop Portal environment is properly set for Wayland sharing
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
