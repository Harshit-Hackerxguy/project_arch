# =============================================================================
# File: ~/.config/hypr/env.conf
# Description: Production-ready Wayland environment variables for Hyprland.
# =============================================================================

# -----------------------------------------------------------------------------
# XDG Specifications & Desktop Portal Compatibility
# -----------------------------------------------------------------------------
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# -----------------------------------------------------------------------------
# Toolkit & Platform Backend Variables
# -----------------------------------------------------------------------------
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = SDL_VIDEODRIVER,wayland

# -----------------------------------------------------------------------------
# Cursor Styling & Scaling
# -----------------------------------------------------------------------------
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

# -----------------------------------------------------------------------------
# Application Specific Wayland Optimizations
# -----------------------------------------------------------------------------
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
