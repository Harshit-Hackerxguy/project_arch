# =============================================================================
# File: ~/.config/hypr/misc.conf
# Description: Miscellaneous compositing and display power management settings.
# =============================================================================

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
    focus_on_activate = true
    animate_manual_resizes = true
    animate_mouse_selection = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
}
