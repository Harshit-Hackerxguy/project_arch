# =============================================================================
# File: ~/.config/hypr/variables.conf
# Description: Centralized variables and application definitions for Hyprland.
# =============================================================================

# -----------------------------------------------------------------------------
# Default Applications
# -----------------------------------------------------------------------------
$terminal = kitty
$fileManager = thunar
$fileManagerAlt = dolphin
$menu = rofi -show drun -show-icons
$browser = firefox
$editor = nwg-look

# -----------------------------------------------------------------------------
# Modifier Key
# -----------------------------------------------------------------------------
$mainMod = SUPER

# -----------------------------------------------------------------------------
# Scripts Path
# -----------------------------------------------------------------------------
$scriptsDir = ~/.config/scripts
